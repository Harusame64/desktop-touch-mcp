name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows-release:
    name: Build Windows release zip
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare release directory
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "release_build"
          $zipPath = Join-Path $PWD "desktop-touch-mcp-windows.zip"

          Remove-Item -LiteralPath $releaseDir -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $zipPath -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $releaseDir | Out-Null

          Copy-Item -LiteralPath "package.json" -Destination $releaseDir
          Copy-Item -LiteralPath "package-lock.json" -Destination $releaseDir
          Copy-Item -LiteralPath "LICENSE" -Destination $releaseDir
          Copy-Item -LiteralPath "README.md" -Destination $releaseDir
          Copy-Item -LiteralPath "README.ja.md" -Destination $releaseDir
          Copy-Item -LiteralPath "dist" -Destination $releaseDir -Recurse

          if (Test-Path -LiteralPath "assets") {
            Copy-Item -LiteralPath "assets" -Destination $releaseDir -Recurse
          }

          if (Test-Path -LiteralPath "bin") {
            $binDir = Join-Path $releaseDir "bin"
            New-Item -ItemType Directory -Path $binDir -Force | Out-Null
            Copy-Item -Path "bin\*.exe" -Destination $binDir -ErrorAction SilentlyContinue
          }

          $pkgPath = Join-Path $releaseDir "package.json"
          $pkg = Get-Content -Raw -LiteralPath $pkgPath | ConvertFrom-Json
          $pkg.main = "dist/index.js"
          $runtimeDeps = [ordered]@{}
          foreach ($name in @(
            "@modelcontextprotocol/sdk",
            "@nut-tree-fork/nut-js",
            "koffi",
            "sharp",
            "ws",
            "zod"
          )) {
            $runtimeDeps[$name] = $pkg.devDependencies.PSObject.Properties[$name].Value
          }
          $pkg | Add-Member -Force -NotePropertyName "dependencies" -NotePropertyValue $runtimeDeps
          if ($pkg.PSObject.Properties.Name -contains "bin") {
            $pkg.PSObject.Properties.Remove("bin")
          }
          if ($pkg.PSObject.Properties.Name -contains "files") {
            $pkg.PSObject.Properties.Remove("files")
          }
          if ($pkg.PSObject.Properties.Name -contains "scripts") {
            $pkg.PSObject.Properties.Remove("scripts")
          }
          $pkg | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $pkgPath -Encoding UTF8

      - name: Install production dependencies
        shell: pwsh
        run: |
          # Build a clean package.json with ONLY dependencies (no devDependencies)
          # in a completely isolated temp directory to avoid any npm parent-traversal
          # or cache interference from the workspace.
          $isolatedDir = Join-Path $env:TEMP "dtmcp-release-$(New-Guid)"
          New-Item -ItemType Directory -Path $isolatedDir | Out-Null

          # Read the release_build package.json (which has both dependencies and devDependencies)
          $releasePkg = Get-Content -Raw -LiteralPath "release_build\package.json" | ConvertFrom-Json

          # Create a minimal package.json with only the fields npm install needs
          $minimalPkg = [ordered]@{
            name         = $releasePkg.name
            version      = $releasePkg.version
            type         = "module"
            dependencies = [ordered]@{}
          }
          foreach ($prop in $releasePkg.dependencies.PSObject.Properties) {
            $minimalPkg.dependencies[$prop.Name] = $prop.Value
          }
          $minimalPkg | ConvertTo-Json -Depth 10 | Set-Content -LiteralPath "$isolatedDir\package.json" -Encoding UTF8

          Write-Host "=== Isolated package.json ==="
          Get-Content "$isolatedDir\package.json"
          Write-Host "=== Installing in $isolatedDir ==="

          Push-Location $isolatedDir
          npm install --no-package-lock 2>&1 | Write-Host
          Pop-Location

          # Verify node_modules was actually created
          $nmPath = Join-Path $isolatedDir "node_modules"
          if (-not (Test-Path $nmPath)) {
            throw "FATAL: npm install produced no node_modules in $isolatedDir"
          }
          $count = (Get-ChildItem -Path $nmPath -Directory | Measure-Object).Count
          Write-Host "=== Installed $count top-level packages ==="
          if ($count -lt 5) {
            Get-ChildItem -Path $nmPath -Directory | ForEach-Object { Write-Host "  $_" }
            throw "FATAL: Expected 5+ top-level packages, got $count"
          }

          # Move the node_modules into release_build
          Move-Item -LiteralPath $nmPath -Destination "release_build\node_modules"

      - name: Prune release package metadata
        shell: pwsh
        run: |
          $pkgPath = Join-Path $PWD "release_build\package.json"
          $pkg = Get-Content -Raw -LiteralPath $pkgPath | ConvertFrom-Json
          if ($pkg.PSObject.Properties.Name -contains "devDependencies") {
            $pkg.PSObject.Properties.Remove("devDependencies")
          }
          $pkg | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $pkgPath -Encoding UTF8

      - name: Create zip
        shell: pwsh
        run: |
          # Compress-Archive silently drops files in deeply nested node_modules (e.g. @modelcontextprotocol/sdk).
          # Use 7-Zip which is pre-installed on windows-latest runners.
          Push-Location release_build
          & "C:\Program Files\7-Zip\7z.exe" a -tzip "..\desktop-touch-mcp-windows.zip" "." -r
          Pop-Location
          if ($LASTEXITCODE -ne 0) { throw "7z failed with exit code $LASTEXITCODE" }

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: desktop-touch-mcp-windows.zip
          fail_on_unmatched_files: true
